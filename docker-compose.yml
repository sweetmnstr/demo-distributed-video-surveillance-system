services:
  redis:
    image: redis:7-alpine
    ports: ["127.0.0.1:6379:6379"]

  camera-sim:
    build: { context: ., dockerfile: packages/camera-sim/Dockerfile }
    environment:
      RTSP_URL: rtsp://0.0.0.0:1111/camera

  server-a:
    build: { context: ., dockerfile: packages/server-a/Dockerfile }
    depends_on: [camera-sim, redis]
    environment:
      RTSP_URL: rtsp://camera-sim:1111/camera
      REDIS_URL: redis://redis:6379
      PUBLIC_KEY_PATH: /app/config/keys/public.pem
      VIDEO_WS_PORT: "2222"
      CONTROL_WS_URL: ws://server-b:3001
    volumes: ["./config:/app/config:ro"]
    ports: ["127.0.0.1:2222:2222"]

  server-b:
    build: { context: ., dockerfile: packages/server-b/Dockerfile }
    depends_on: [redis]
    environment:
      HTTP_PORT: "3000"
      CONTROL_WS_PORT: "3002"
      INTERSERVER_WS_PORT: "3001"
      PRIVATE_KEY_PATH: /app/config/keys/private.pem
      PUBLIC_KEY_PATH: /app/config/keys/public.pem
      USERS_PATH: /app/config/users.json
      COMMANDS_LOG_PATH: /app/config/commands.log
      HMAC_SECRET: change-me-in-production
      REDIS_URL: redis://redis:6379
      JWT_TTL_SECONDS: "3600"
    volumes: ["./config:/app/config"]
    ports: ["127.0.0.1:3000:3000", "127.0.0.1:3001:3001", "127.0.0.1:3002:3002"]

  web-client:
    build:
      context: .
      dockerfile: apps/web-client/Dockerfile
      args:
        VITE_SERVER_B_HTTP: http://127.0.0.1:3000
        VITE_SERVER_B_WS: ws://127.0.0.1:3002
        VITE_SERVER_A_WS: ws://127.0.0.1:2222
    depends_on: [server-a, server-b]
    ports: ["127.0.0.1:8080:80"]
